    <title>Asad Ali — Software Engineer &amp; Full-Stack Developer</title>

      name="description"

    <!-- Open Graph -->

      property="og:description"

    />

    <!-- Twitter -->

      content="Engineering ideas into intelligent solutions — portfolio of Asad Ali, Software Engineer &amp; Full-Stack Developer."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Fonts are self-hosted via @fontsource, so no external preconnect needed -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Set the theme before first paint so there is no flash of the
         wrong theme. Mirrors the logic in src/lib/ThemeContext.jsx:
         saved choice wins, otherwise follow the OS preference. -->
    <script>
      ;(function () {
        try {
          var saved = localStorage.getItem('theme')
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'light' ? '#F6F4EF' : '#08121F')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
